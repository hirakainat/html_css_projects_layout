<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact_form</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <main>
        <section class="contact-form">
            <div class="form-header">
                <h1>Contact Us For Work</h1>
                <p>
                    we would love to hear from you.please fill out the form below
                </p>
            </div>
            <form>
                <div class="form-field">
                    <label for="name">Name</label>
                    <input id="name" type="text" placeholder="Your Name">
                </div>
                <div class="form-field">
                    <label for="email">Email</label>
                    <input id="email" type="text" placeholder="Your Email">
                </div>
                <div class="form-field">
                    <label for="message">Message</label>
                    <textarea id="message" type="text" placeholder="Your message"></textarea>
                </div>
                <div class="form-field">
                    <label for="subject">Subject</label>
                    <textarea id="subject" type="text" placeholder="Your Subject"></textarea>
                </div>
                </div>
                <div class="form-submit">
                    <button type="submit">
                        Send Message
                    </button>
                </div>
            </form>
        </section>

        <section class="contact-info">
            <div class="info-content">
                <h2>our location</h2>
            </div>
            <div class="info-item">
                <p>
                    123 Main Street,Anytown,CA 91234
                </p>
            </div>

            <div class="info-item">
                <p>
                    Phone:+92 3284749002
                </p>
            </div>

            <div class="info-item">
                <p>
                    Email:realhirakhalid@gmail.com
                </p>
            </div>
            <div class="map-container">
                <img src="C:\Users\Hira\Downloads\map.png">
            </div>
        </section>
    </main>
</body>

</html>
