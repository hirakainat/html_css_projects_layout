<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather_app</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="card">
        <div class="search">
            <input type="text" placeholder="enter your city name" />
            <button>
                <img src="C:Users/Hira/Downloads/images/search.png">
            </button>

        </div>
        <div class="weather">
            <img src="C:Users/Hira/Downloads/images/rain.png" class="weather-icon" />
            <h1 class="temperature">
                22°C
            </h1>
            <h2 class="city">
                New York
            </h2>
            <div class="details">
                <div class="col">
                    <img src="C:Users/Hira/Downloads/images/humidity.png" />
                    <div>
                        <p class="humidity">
                            50%
                        </p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="C:Users/Hira/Downloads/images/wind.png" />
                    <div>
                        <p class="wind">
                            50km/h
                        </p>
                        <p>wind speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
