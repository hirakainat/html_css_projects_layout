<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="background">
        <div class="container">
            <div class="content">
                <h1>Calculate Your Percentage%</h1>
            </div>
            <div class="box">
                <form onsubmit="calculatemarks(event)" id="calculateform" class="calculate-form">
                    <input type="number" class="m" name="maths" placeholder="Maths" />
                    <input type="number" class="e" name="english" placeholder="English" />
                    <input type="number" class="i" name="islamyat" placeholder="Islamyat" />
                    <input type="number" class="s" name="science" placeholder="Science" />
                    <button>Calculate</button>
                </form>

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
